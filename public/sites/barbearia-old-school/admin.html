<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Barbeiro · OldSchool Barbearia</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c9a25a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='6' cy='6' r='3'/%3E%3Cpath d='M8.12 8.12 12 12'/%3E%3Cpath d='M20 4 8.12 15.88'/%3E%3Ccircle cx='6' cy='18' r='3'/%3E%3Cpath d='M14.8 14.8 20 20'/%3E%3C/svg%3E">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: { extend: {
      colors: { ink:'#0c0b09', ink2:'#15130e', ink3:'#1f1c15', gold:'#c9a25a', goldlt:'#e6c98a', cream:'#f1ead9', vred:'#b4452f', vgreen:'#3f7a4f' },
      fontFamily: { display:['Oswald','sans-serif'], body:['Inter','sans-serif'] }
    }}
  }
</script>
<style>
  html,body{ background:#0c0b09; overflow-x:clip; width:100%; }
  body{ font-family:'Inter',sans-serif; color:#b6afa0; -webkit-font-smoothing:antialiased; }
  h1,h2,h3,h4,.font-display{ font-family:'Oswald',sans-serif; }
  .font-700{ font-weight:700; }
  .grid > *{ min-width:0; }
  img,iframe{ max-width:100%; }
  ::-webkit-scrollbar{ width:9px; } ::-webkit-scrollbar-track{ background:#0c0b09; }
  ::-webkit-scrollbar-thumb{ background:#322c20; border-radius:6px; }
  .glass{ background:rgba(21,19,14,.72); backdrop-filter:blur(10px); border:1px solid rgba(201,162,90,.14); }
  .barber-pole{ background:repeating-linear-gradient(45deg,#b4452f 0 14px,#f1ead9 14px 28px,#1f3a5c 28px 42px,#f1ead9 42px 56px); }
  @keyframes fadeUp{ from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
  .reveal{ animation:fadeUp .5s ease-out both; }
</style>
</head>

<body class="font-body bg-ink text-neutral-300 antialiased min-h-screen">

<!-- safelist (classes geradas dinamicamente pelo JS) -->
<span class="hidden text-gold text-vgreen text-vred bg-vgreen/90 border-vred/50"></span>

<!-- ============ TELA DE LOGIN ============ -->
<div id="login" class="min-h-screen flex items-center justify-center p-5">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <span class="inline-flex w-12 h-12 rounded-full border border-gold/40 items-center justify-center mb-4">
        <iconify-icon icon="lucide:scissors" class="text-gold text-xl"></iconify-icon>
      </span>
      <h1 class="font-display font-700 text-3xl text-cream uppercase tracking-[.12em]">Painel do Barbeiro</h1>
      <p class="text-sm text-neutral-500 mt-1">OldSchool Barbearia · Horizontina/RS</p>
    </div>

    <div class="glass rounded-2xl overflow-hidden">
      <div class="barber-pole h-1.5"></div>
      <div class="p-7">
        <!-- etapa 1: escolher barbeiro -->
        <div id="login-barbeiros">
          <p class="text-xs uppercase tracking-[.2em] text-neutral-500 mb-4">Quem está entrando?</p>
          <div id="login-lista" class="space-y-3"></div>
        </div>
        <!-- etapa 2: PIN -->
        <div id="login-pin" class="hidden">
          <button id="pin-voltar" class="text-xs text-neutral-500 hover:text-cream flex items-center gap-1 mb-4">
            <iconify-icon icon="lucide:chevron-left"></iconify-icon> trocar de barbeiro
          </button>
          <p class="text-cream font-medium mb-1">Olá, <span id="pin-nome"></span></p>
          <p class="text-xs text-neutral-500 mb-4">Digite seu PIN de 4 dígitos para acessar.</p>
          <input id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="••••"
            class="w-full bg-ink border border-gold/15 rounded-sm px-4 py-3 text-center text-2xl tracking-[.5em] text-cream focus:outline-none focus:border-gold/60">
          <p id="pin-erro" class="hidden text-xs text-vred mt-2">PIN incorreto. Tente novamente.</p>
          <button id="pin-entrar" class="w-full mt-4 bg-gold text-ink font-semibold py-3 rounded-sm hover:bg-goldlt transition-colors">
            Entrar
          </button>
        </div>
      </div>
    </div>

    <div class="glass rounded-xl mt-4 p-4 text-xs text-neutral-500">
      <span class="text-gold uppercase tracking-wider">Protótipo — PINs de demonstração</span>
      <div id="login-dica" class="mt-2 grid grid-cols-3 gap-2 text-center"></div>
    </div>
    <a href="index.html" class="block text-center text-xs text-neutral-600 hover:text-gold mt-4">← voltar ao site</a>
  </div>
</div>

<!-- ============ DASHBOARD ============ -->
<div id="dashboard" class="hidden">
  <header class="glass border-b border-gold/10 sticky top-0 z-30">
    <div class="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="w-9 h-9 rounded-full bg-ink3 border border-gold/30 flex items-center justify-center font-display text-gold" id="dash-av"></span>
        <div class="leading-tight">
          <div class="text-cream font-medium text-sm" id="dash-nome"></div>
          <div class="text-[11px] text-gold uppercase tracking-wider">Painel do barbeiro</div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="dash-atualizar" class="text-xs text-neutral-400 hover:text-cream border border-gold/15 rounded-sm px-3 py-2 flex items-center gap-1.5">
          <iconify-icon icon="lucide:refresh-cw"></iconify-icon> Atualizar
        </button>
        <button id="dash-sair" class="text-xs text-neutral-400 hover:text-cream border border-gold/15 rounded-sm px-3 py-2 flex items-center gap-1.5">
          <iconify-icon icon="lucide:log-out"></iconify-icon> Sair
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-5 py-8">
    <!-- métricas -->
    <div id="dash-stats" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>

    <!-- filtros -->
    <div class="flex items-center justify-between flex-wrap gap-3 mb-5">
      <h2 class="font-display text-2xl text-cream uppercase">Solicitações de agendamento</h2>
      <div id="dash-filtros" class="flex gap-1.5 text-xs"></div>
    </div>

    <!-- lista -->
    <div id="dash-lista" class="space-y-4"></div>
  </main>
</div>

<script src="assets/dados.js"></script>
<script src="assets/admin.js"></script>
</body>
</html>
